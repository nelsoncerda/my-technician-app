# DriveForm production virtual hosts for the Lightsail instance.

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name spacetimefly.com;

    client_max_body_size 25m;

    location ^~ /api/account/ {
        proxy_pass http://127.0.0.1:3004;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 90s;
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    ssl_certificate /etc/letsencrypt/live/spacetimefly.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/spacetimefly.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.spacetimefly.com;

    ssl_certificate /etc/letsencrypt/live/spacetimefly.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/spacetimefly.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://spacetimefly.com$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name spacetimefly.com www.spacetimefly.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://spacetimefly.com$request_uri;
    }
}
