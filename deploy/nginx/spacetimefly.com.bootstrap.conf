# Temporary HTTP-only virtual host used while spacetimefly.com DNS and TLS are
# being provisioned. DriveForm remains unavailable until the final vhost is
# installed.

server {
    listen 80;
    listen [::]:80;
    server_name spacetimefly.com www.spacetimefly.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        add_header Retry-After 300 always;
        return 503;
    }
}
